<text y="38" font-family="'Courier New', Courier, monospace" font-size="13"><tspan x="20.0" fill="#6e7681">collected </tspan><tspan x="98.0" fill="#c9d1d9">10</tspan><tspan x="113.6" fill="#6e7681"> tests</tspan></text><text y="78" font-family="'Courier New', Courier, monospace" font-size="13"><tspan x="20.0" fill="#c9d1d9">tests/bdd/test_checkout.py</tspan></text><text y="98" font-family="'Courier New', Courier, monospace" font-size="13"><tspan x="20.0" fill="#cae8ff">  Feature: Shopping cart checkout</tspan></text><text y="118" font-family="'Courier New', Courier, monospace" font-size="13"><tspan x="20.0" fill="#79c0ff">    Scenario: </tspan><tspan x="129.2" fill="#79c0ff">Guest completes a purchase</tspan></text><text y="138" font-family="'Courier New', Courier, monospace" font-size="13"><tspan x="20.0" fill="#6e7681">      </tspan><tspan x="66.8" fill="#56d364">---</tspan><tspan x="90.2" fill="#c9d1d9"> </tspan><tspan x="98.0" fill="#56d364">PASS</tspan><tspan x="144.8" fill="#56d364">  Given the cart contains 2 items</tspan><tspan x="402.2" fill="#6e7681">  0.0ms</tspan></text><text y="158" font-family="'Courier New', Courier, monospace" font-size="13"><tspan x="20.0" fill="#6e7681">      </tspan><tspan x="66.8" fill="#56d364">---</tspan><tspan x="90.2" fill="#c9d1d9"> </tspan><tspan x="98.0" fill="#56d364">PASS</tspan><tspan x="144.8" fill="#56d364">  When the guest submits valid payment</tspan><tspan x="433.4" fill="#6e7681">  0.0ms</tspan></text><text y="178" font-family="'Courier New', Courier, monospace" font-size="13"><tspan x="20.0" fill="#6e7681">      </tspan><tspan x="66.8" fill="#56d364">---</tspan><tspan x="90.2" fill="#c9d1d9"> </tspan><tspan x="98.0" fill="#56d364">PASS</tspan><tspan x="144.8" fill="#56d364">  Then the order confirmation is shown</tspan><tspan x="441.2" fill="#6e7681">  0.0ms</tspan></text><text y="218" font-family="'Courier New', Courier, monospace" font-size="13"><tspan x="20.0" fill="#79c0ff">    Scenario: </tspan><tspan x="129